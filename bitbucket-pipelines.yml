#
# fixdecoder command-line entry point and CLI orchestration.
#
# The binary ties together the dictionary tooling and the streaming FIX log
# prettifier.  This file is intentionally light on protocol logic; it wires
# user input into the focused modules under `src/decoder` and `src/fix`.
# The comments favour UK English and aim to give future maintainers a quick
# reminder of why each function exists and how it cooperates with the rest
# of the app.

image: golang:1.24.3

definitions:
  caches:
    go: go

  steps:
    - step: &commit_message_lint
      image: node:20
      name: Commit Message Lint (Conventional Commits)
      caches:
        - node
      script:
        - npm ci
        - npx commitlint --from=origin/${BITBUCKET_PR_DESTINATION_BRANCH:-main}

    - step: &security_scan
        name: Security Scan
        script:
          # Run a security scan for sensitive data
          - pipe: atlassian/git-secrets-scan:3.1.0
            variables:
              DEBUG: "true"
              CREATE_REPORT: "true"
              GITLEAKS_COMMAND: "dir"
              GITLEAKS_EXTRA_ARGS:
                - "-v"
                - "--config=gitleaks-config.toml"

    - step: &build
        name: Build
        caches:
          - go
        script:
          - make build
        after-script:
          - ls -lart bin/
        artifacts:
          - bin/**

    - step: &unit-tests
        name: Unit Tests
        caches:
          - go
        script:
          - make unit-test
        after-script:
          - ls -lart reports
        artifacts:
          - reports/*.out
          - reports/*.xml

    - step: &integration-tests
        name: Integration Tests
        caches:
          - go
        script:
          - make integration-test
        after-script:
          - ls -lart reports
        artifacts:
          - reports/*.out

    - step: &sonar_analysis
        name: SonarCloud Analysis
        artifacts:
          - reports/**
        caches:
          - go
        before-script:
          - ls -lart reports
        script:
          - pipe: sonarsource/sonarcloud-scan:3.1.0
            variables:
              SONAR_TOKEN: $SONAR_TOKEN
          - pipe: sonarsource/sonarcloud-quality-gate:0.2.0
            variables:
              SONAR_TOKEN: $SONAR_TOKEN

pipelines:
  default:
    - step: *security_scan
    - step: *build
    - step: *unit-tests
    - step: *integration-tests
    - step: *sonar_analysis

  branches:
    "{main,master,develop}":
      - step: *security_scan
      - step: *build
      - step: *unit-tests
      - step: *integration-tests
      - step: *sonar_analysis

  pull-requests:
    '**':
      - step:
          name: Commit Message Lint (Conventional Commits)
          caches:
            - node
          script:
            - npm ci
            - npx commitlint --from=origin/${BITBUCKET_PR_DESTINATION_BRANCH:-main}
