---
# yamllint disable rule:truthy rule:line-length
# SPDX-License-Identifier: AGPL-3.0-only
# SPDX-FileCopyrightText: 2026 Steve Clarke <stephenlclarke@mac.com> - https://xyzzy.tools
#
# fixdecoder command-line entry point and CLI orchestration.
#
# The binary ties together the dictionary tooling and the streaming FIX log
# prettifier.  This file is intentionally light on protocol logic; it wires
# user input into the focused modules under `src/decoder` and `src/fix`.
# The comments favour UK English and aim to give future maintainers a quick
# reminder of why each function exists and how it cooperates with the rest
# of the app.

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: read

env:
  GO_VERSION: "1.24.3"

jobs:
  commit-message-lint:
    name: Commit Message Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint pull request commits
        run: >
          npx --yes
          --package @commitlint/cli
          --package @commitlint/config-conventional
          commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@latest
      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" detect --source . --no-banner --redact --verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: make build
      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: bin/**
          if-no-files-found: error

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        run: make unit-test
      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            reports/coverage.out
            reports/test-report-*.xml
            reports/unit-test-report.xml
          if-no-files-found: error

  integration-tests:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run integration tests
        run: make integration-test
      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports
          path: reports/coverage.integration.out
          if-no-files-found: error

  sonar-analysis:
    name: SonarCloud Analysis
    needs:
      - unit-tests
      - integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download unit test reports
        uses: actions/download-artifact@v4
        with:
          name: unit-test-reports
          path: reports
      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-reports
          path: reports
      - name: Verify Sonar reports
        run: |
          test -s reports/coverage.out
          test -s reports/coverage.integration.out
          test -s reports/unit-test-report.xml
      - name: Run Sonar scan when configured
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PR_NUMBER: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          SONAR_PR_BASE: ${{ github.event.pull_request.base.ref }}
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not configured; skipping SonarCloud analysis."
            exit 0
          fi
          PR_OPTS=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_OPTS+=("-Dsonar.pullrequest.key=${SONAR_PR_NUMBER}")
            PR_OPTS+=("-Dsonar.pullrequest.branch=${SONAR_PR_BRANCH}")
            PR_OPTS+=("-Dsonar.pullrequest.base=${SONAR_PR_BASE}")
            PR_OPTS+=("-Dsonar.pullrequest.provider=github")
          fi
          ./ci.sh scan "${PR_OPTS[@]}"

  release-build:
    name: Release Build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build release binaries
        run: ./ci.sh build-all
      - name: Upload release artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: bin/**
          if-no-files-found: error
