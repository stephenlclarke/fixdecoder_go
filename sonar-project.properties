#
# fixdecoder command-line entry point and CLI orchestration.
#
# The binary ties together the dictionary tooling and the streaming FIX log
# prettifier.  This file is intentionally light on protocol logic; it wires
# user input into the focused modules under `src/decoder` and `src/fix`.
# The comments favour UK English and aim to give future maintainers a quick
# reminder of why each function exists and how it cooperates with the rest
# of the app.

#
# SonarCloud project key for the Go repository.
sonar.projectKey=fixdecoder_go
sonar.projectName=fixdecoder_go
sonar.projectVersion=1.0.0
sonar.projectDescription=FIX decoder and streaming log prettifier written in Go.
sonar.organization=stephenlclarke
sonar.sourceEncoding=UTF-8
sonar.host.url=https://sonarcloud.io

sonar.language=go
sonar.sources=.
sonar.tests=.
sonar.inclusions=**/*.go
sonar.exclusions=**/*_test.go,resources/**,fix/fix*/**/*.go
sonar.test.inclusions=**/*_test.go

sonar.junit.reportPaths=reports/test-report-*.xml,reports/unit-test-report.xml
sonar.go.coverage.reportPaths=reports/coverage.out,reports/coverage.integration.out

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
